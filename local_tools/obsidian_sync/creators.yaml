vault_path: /Users/steven/Documents/Obsidian/MyVault
output_subdir: Douyin/口播博主
state_db: local_tools/obsidian_sync/state.sqlite
work_dir: local_tools/obsidian_sync/work
env_file: local_tools/obsidian_sync/.env
douyin_cookie_file: local_tools/douyin_cookie.txt
weibo_cookie_file: local_tools/weibo_cookie.txt
wechat_mp_cookie_file: local_tools/wechat_mp_cookie.txt
wechat_mp_token_file: local_tools/wechat_mp_token.txt
fetch:
  count_per_page: 20
  max_pages: 50
  douyin_full_max_pages: 300
  wechat_mp_count_per_page: 5
  wechat_mp_max_pages: 10
  wechat_mp_full_max_pages: 1000
  wechat_mp_delay_seconds: 3
  delay_seconds: 2
download:
  watermark: keep
  timeout_seconds: 120
  cleanup_media: true
retention:
  keep_video: false
  keep_audio: false
  save_transcript_txt: false
  save_source_raw: false
  include_transcript_in_markdown: true
content_filter:
  enabled: true
  filter_promotions: true
  filter_non_speech: true
  min_score: 6
transcribe:
  provider: faster_whisper
  model: small
  device: cpu
  compute_type: int8
  language: zh
  vad_filter: true
subtitle_ocr:
  interval_seconds: 1.0
  crop_top_ratio: 0.48
  crop_bottom_ratio: 0.94
  crop_left_ratio: 0.03
  crop_right_ratio: 0.97
  scale: 2.0
  min_confidence: 0.45
  similarity_threshold: 0.86
  min_transcript_chars: 20
  min_text_chars: 2
  min_cjk_chars: 2
  prefer_cjk: true
  max_frames: 900
summary:
  provider: glm
  api_key_env: GLM_API_KEY
  base_url: https://open.bigmodel.cn/api/coding/paas/v4
  model: glm-5-turbo
  thinking: disabled
  temperature: 0.2
  max_tokens: 5000
  prompt: local_tools/obsidian_sync/prompts/summarize.md
  foreign_prompt: local_tools/obsidian_sync/prompts/foreign_summarize.md
  output_language: 中文
youtube:
  max_videos: 30
  full_max_videos: 300
  subtitle_languages:
  - zh-Hans
  - zh-CN
  - zh
  - en
  - en-US
  - en-GB
  audio_timeout_seconds: 600
youtube_transcribe:
  language: auto
podcast_transcribe:
  language: auto
podcast_summary:
  model: glm-5.2
  max_tokens: 9000
  chunk_chars: 45000
  chunk_max_tokens: 2500
  podcast_prompt: local_tools/obsidian_sync/prompts/podcast_summarize.md
weekly_report:
  output_subdir: Douyin/周报
  telegram:
    max_creators: 8
    max_items_per_creator: 3
    title_chars: 72
    summary_chars: 80
    max_chars: 3500
  hermes:
    enabled: true
    profile: secretary
    bot_username: '@Steven_Secretary_bot'
    timeout_seconds: 120
daily_report:
  output_subdir: Douyin/日报
  telegram:
    max_creators: 10
    max_items_per_creator: 5
    title_chars: 72
    summary_chars: 80
    max_chars: 3500
  hermes:
    enabled: true
    profile: secretary
    bot_username: '@Steven_Secretary_bot'
    timeout_seconds: 120
health_check:
  output_subdir: Douyin/自检
  auto_retry: true
  retry_limit_per_source: 20
  retry_recent_days: 3
  max_retry_items: 8
  hermes:
    enabled: true
    profile: secretary
    bot_username: '@Steven_Secretary_bot'
    timeout_seconds: 120
